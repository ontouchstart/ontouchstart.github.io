name: pages

on: push

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: make env
        run: make env | tee ontouchstart.github.io/env.log
      - name: make test
        run: make test | tee ontouchstart.github.io/test.log
      - name: make test-facebook-react
        run: make -C github/facebook/react test | tee ontouchstart.github.io/github-facebook-react-test.log
      - name: Setup Pages
        uses: actions/configure-pages@v2
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: './ontouchstart.github.io'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1
